name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep — catches secrets that landed on main between PR scans
    # (e.g. via direct push or admin merge that bypassed PR checks).
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan every commit on the PR branch,
          # not just the tip. Catches secrets that were committed and then
          # "removed" in a later commit.
          fetch-depth: 0

      # Third-party action pinned to a commit SHA (v2 tag).
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
