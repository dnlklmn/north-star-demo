version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ['@types/*']
      eslint:
        patterns: ['eslint*', '@eslint/*', 'typescript-eslint']
      react:
        patterns: ['react', 'react-dom', '@types/react', '@types/react-dom']

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
